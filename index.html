<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mind Palace — Spatial IDE</title>
    <link rel="stylesheet" href="css/room.css">
    <link rel="stylesheet" href="css/expert.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            overflow: hidden; 
            font-family: 'Courier New', monospace;
            user-select: none;
        }
        #gameCanvas { 
            display: block; 
            margin: 0 auto; 
            background: #000;
            cursor: crosshair;
        }
        #hallway-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        #instructions {
            position: fixed;
            bottom: 10px;
            left: 10px;
            color: #ffd700;
            font-size: 11px;
            background: rgba(0,0,0,0.8);
            padding: 12px 16px;
            border-radius: 6px;
            border: 1px solid #8b4513;
            z-index: 1000;
            line-height: 1.6;
        }
        #instructions strong { color: #ffd700; }
        #wing-status {
            position: fixed;
            top: 10px;
            right: 10px;
            color: #ffd700;
            font-size: 12px;
            background: rgba(0,0,0,0.8);
            padding: 8px 14px;
            border-radius: 6px;
            border: 1px solid #8b4513;
            z-index: 1000;
        }
        #expert-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: linear-gradient(180deg, #90ee90 0%, #32cd32 100%);
            border: 2px solid #90ee90;
            border-radius: 6px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            z-index: 200;
        }
        #expert-toggle:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(144,238,144,0.4);
        }
    </style>
</head>
<body>
    <!-- Hallway View (Raycaster) -->
    <div id="hallway-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="instructions">
            <strong>WASD</strong> Move | <strong>Mouse</strong> Look<br>
            <strong>Click Door</strong> Enter Room | <strong>ESC</strong> Exit<br>
            <strong>←/→</strong> Scroll Books | <strong>Click Book</strong> View File
        </div>
        <div id="wing-status">📍 WEST WING — Core Systems</div>
    </div>
    
    <!-- Room View (Bookshelf Navigation) -->
    <div id="room-container">
        <div class="room-header">
            <h1 id="room-title">Repository Name</h1>
            <div class="room-meta-row">
                <div class="room-meta">
                    <span id="room-category">Category</span>
                    <span id="room-language">Language</span>
                    <span id="room-stars">⭐ 0</span>
                    <span id="room-updated">Updated</span>
                </div>
            </div>
            <p id="room-description">Description text appears here...</p>
            <button id="expert-toggle" onclick="ExpertSystem.toggle()">🧠 Expert Suggestions</button>
        </div>
        
        <div id="bookshelf" tabindex="0">
            <!-- Books rendered by RoomSystem -->
        </div>
        
        <!-- Expert Panel (Left) -->
        <div id="expert-panel">
            <h3>🧠 Expert Architect</h3>
            <div id="expert-content"></div>
        </div>
        
        <!-- File Viewer (Right) -->
        <div id="file-viewer">
            <h3 id="file-title">File Name</h3>
            <div id="file-content"></div>
        </div>
        
        <button id="back-button">← Back to Hallway (ESC)</button>
    </div>
    
    <!-- Systems -->
    <script src="js/audio.js"></script>
    <script src="js/expert.js"></script>
    <script src="js/room.js"></script>
    <script src="js/engine.js"></script>
</body>
</html>
