<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindPalace</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #050510; color: #e0e0ff; font-family: 'Courier New', monospace; }
        #ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
            display: flex; flex-direction: column; justify-content: space-between; padding: 20px;
        }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 12px; height: 12px; border: 2px solid rgba(255,0,255,0.6);
            transform: translate(-50%, -50%); border-radius: 50%;
            pointer-events: none; z-index: 11;
        }
        #panel {
            max-width: 360px; background: rgba(10,10,31,0.9); border: 1px solid #333;
            border-radius: 8px; padding: 16px; pointer-events: auto;
            box-shadow: 0 0 20px rgba(0,255,255,0.1);
        }
        #panel h2 { color: #ff00ff; font-size: 18px; margin-bottom: 8px; }
        #panel p { font-size: 13px; color: #aaa; margin-bottom: 6px; }
        #panel .tag { display: inline-block; padding: 2px 6px; background: #222; border-radius: 4px; font-size: 11px; margin-right: 4px; }
        #footer {
            color: #666; font-size: 12px;
        }
        #blocker {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5,5,16,0.85); display: flex; align-items: center; justify-content: center;
            z-index: 20; pointer-events: auto; cursor: pointer;
        }
        #blocker h1 { color: #00ffff; text-shadow: 0 0 20px #00ffff; font-size: 32px; text-align: center; }
        #blocker p { color: #aaa; margin-top: 12px; font-size: 14px; text-align: center; }
    </style>
</head>
<body>
    <div id="blocker" onclick="start()">
        <div>
            <h1>🏛️ MindPalace</h1>
            <p>Click to enter. Walk with WASD. Mouse to look.</p>
            <p>Rooms = memories. Hallways = relationships.</p>
        </div>
    </div>
    <div id="crosshair"></div>
    <div id="ui">
        <div id="panel" style="display:none;">
            <h2 id="room-title">Room</h2>
            <p id="room-type" class="tag"></p>
            <p id="room-desc"></p>
        </div>
        <div id="footer">MindPalace v0.1 — graph-based memory explorer</div>
    </div>

    <script type="module" src="mindpalace.js"></script>
</body>
</html>
