name: Refresh MindPalace Data
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Fetch repos and build palace
        run: |
          python3 scripts/fetch_repos.py
          python3 scripts/build_palace.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit updated palace data
        run: |
          git config user.name "Aegis"
          git config user.email "chrisalunlloyd2@gmail.com"
          git add data/palace.json
          git diff --cached --quiet || (git commit -m "auto: refresh palace data" && git push origin main)
