<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mind Palace 3D — Spatial IDE</title>
    <link rel="stylesheet" href="css/room.css">
    <link rel="stylesheet" href="css/expert.css">
    <link rel="stylesheet" href="css/3d.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            overflow: hidden; 
            font-family: 'Courier New', monospace;
            user-select: none;
        }
        #gameCanvas3D { 
            display: block; 
            width: 100vw;
            height: 100vh;
            cursor: crosshair;
        }
        #hud-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }
        #hud-container > * {
            pointer-events: auto;
        }
        #instructions {
            position: fixed;
            bottom: 10px;
            left: 10px;
            color: #ffd700;
            font-size: 11px;
            background: rgba(0,0,0,0.8);
            padding: 12px 16px;
            border-radius: 6px;
            border: 1px solid #8b4513;
            z-index: 1000;
            line-height: 1.6;
        }
        #instructions strong { color: #ffd700; }
        #wing-status {
            position: fixed;
            top: 10px;
            right: 10px;
            color: #ffd700;
            font-size: 12px;
            background: rgba(0,0,0,0.8);
            padding: 8px 14px;
            border-radius: 6px;
            border: 1px solid #8b4513;
            z-index: 1000;
        }
        #expert-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: linear-gradient(180deg, #90ee90 0%, #32cd32 100%);
            border: 2px solid #90ee90;
            border-radius: 6px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            z-index: 200;
        }
        #crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            pointer-events: none;
            z-index: 1000;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255,215,0,0.6);
        }
        #crosshair::before {
            width: 2px;
            height: 20px;
            left: 9px;
            top: 0;
        }
        #crosshair::after {
            width: 20px;
            height: 2px;
            left: 0;
            top: 9px;
        }
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            flex-direction: column;
        }
        #loading-screen h1 {
            color: #ffd700;
            font-size: 32px;
            margin-bottom: 20px;
        }
        #loading-bar {
            width: 300px;
            height: 20px;
            background: rgba(139,69,19,0.3);
            border-radius: 10px;
            border: 2px solid #8b4513;
            overflow: hidden;
        }
        #loading-progress {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ffd700 0%, #ff8c00 100%);
            transition: width 0.3s;
        }
        #loading-text {
            color: #aaa;
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading-screen">
        <h1>🏛️ Mind Palace 3D</h1>
        <div id="loading-bar">
            <div id="loading-progress"></div>
        </div>
        <div id="loading-text">Loading 3D engine...</div>
    </div>
    
    <!-- 3D Canvas -->
    <canvas id="gameCanvas3D"></canvas>
    
    <!-- Crosshair -->
    <div id="crosshair"></div>
    
    <!-- HUD Layer -->
    <div id="hud-container">
        <div id="instructions">
            <strong>WASD</strong> Move | <strong>Mouse</strong> Look<br>
            <strong>Click Door</strong> Enter | <strong>ESC</strong> Exit<br>
            <strong>Click Book</strong> Open (flip animation)<br>
            <strong>E</strong> Toggle Expert Panel
        </div>
        <div id="wing-status">📍 ATRIUM — Central Hub</div>
    </div>
    
    <!-- Room UI (hidden when in hallway) -->
    <div id="room-container" style="display:none;">
        <div class="room-header">
            <h1 id="room-title">Repository Name</h1>
            <div class="room-meta-row">
                <div class="room-meta">
                    <span id="room-category">Category</span>
                    <span id="room-language">Language</span>
                    <span id="room-stars">⭐ 0</span>
                    <span id="room-updated">Updated</span>
                </div>
            </div>
            <p id="room-description">Description...</p>
            <button id="expert-toggle" onclick="ExpertSystem.toggle()">🧠 Expert Suggestions</button>
        </div>
        
        <div id="expert-panel">
            <h3>🧠 Expert Architect</h3>
            <div id="expert-content"></div>
        </div>
        
        <div id="file-viewer">
            <h3 id="file-title">File Name</h3>
            <div id="file-content"></div>
        </div>
        
        <button id="back-button" onclick="Engine3D.exitRoom()">← Back to Hallway (ESC)</button>
    </div>
    
    <!-- Three.js from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- Mind Palace Systems -->
    <script src="js/audio.js"></script>
    <script src="js/expert.js"></script>
    <script src="js/3d-controls.js"></script>
    <script src="js/3d-room.js"></script>
    <script src="js/3d-engine.js"></script>
</body>
</html>
