<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mind Palace 4D — Spatial Code Creation</title>
    <link rel="stylesheet" href="css/room.css">
    <link rel="stylesheet" href="css/expert.css">
    <link rel="stylesheet" href="css/3d.css">
    <link rel="stylesheet" href="css/4d.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            overflow: hidden; 
            font-family: 'Courier New', monospace;
            user-select: none;
        }
        #gameCanvas3D { 
            display: block; 
            width: 100vw;
            height: 100vh;
            cursor: crosshair;
        }
        #click-start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: #00ff88;
            cursor: pointer;
        }
        #click-start-overlay h1 {
            font-size: 4em;
            text-shadow: 0 0 30px #00ff88;
            margin-bottom: 20px;
        }
        #click-start-overlay p {
            font-size: 1.5em;
            margin: 10px;
        }
        #click-start-overlay .controls {
            margin-top: 40px;
            text-align: center;
            line-height: 2;
            font-size: 1.2em;
        }
        #click-start-overlay .controls strong {
            color: #00ffff;
        }
    </style>
</head>
<body>
    <!-- Click to Start Overlay -->
    <div id="click-start-overlay">
        <h1>🏛️ MIND PALACE 4D</h1>
        <p>Click anywhere to enter the hallway</p>
        <div class="controls">
            <p>🚶 <strong>W A S D</strong> — Walk</p>
            <p>🖱️ <strong>Mouse</strong> — Look around</p>
            <p>🚪 <strong>Click Door</strong> — Enter room</p>
            <p>📖 <strong>Click Book</strong> — Read file</p>
            <p>⌨️ <strong>N</strong> — New research room</p>
            <p>⌨️ <strong>E</strong> — Expert panel</p>
            <p>⌨️ <strong>ESC</strong> — Exit room / Release mouse</p>
        </div>
    </div>

    <!-- 3D Canvas -->
    <canvas id="gameCanvas3D"></canvas>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/3d-controls.js"></script>
    <script src="js/3d-engine.js"></script>
    <script src="js/3d-room.js"></script>
    <script src="js/local-repos.js"></script>
    <script src="js/4d-creator.js"></script>
    <script src="js/4d-engine.js"></script>
    
    <script>
        // Initialize on click
        const overlay = document.getElementById('click-start-overlay');
        let initialized = false;

        overlay.addEventListener('click', async () => {
            if (!initialized) {
                initialized = true;
                
                // Fade out overlay
                overlay.style.transition = 'opacity 0.5s';
                overlay.style.opacity = '0';
                overlay.style.pointerEvents = 'none';
                setTimeout(() => overlay.remove(), 500);
                
                // Request pointer lock
                const canvas = document.getElementById('gameCanvas3D');
                canvas.requestPointerLock = canvas.requestPointerLock || canvas.mozRequestPointerLock;
                canvas.requestPointerLock();
                
                // Enable controls
                window.controlsEnabled = true;
                
                // Fetch repos and initialize 4D engine
                await window.localRepoBrowser.fetchRepos();
                init4DEngine();
                
                console.log('🏛️ Mind Palace 4D activated!');
            }
        });

        // ESC to release pointer
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && document.pointerLockElement) {
                document.exitPointerLock();
            }
        });
    </script>
</body>
</html>
